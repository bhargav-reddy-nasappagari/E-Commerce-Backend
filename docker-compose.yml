  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: ${DB_NAME:-ecommerce_db}
  #     DB_USERNAME: ${DB_USERNAME:-ecommerce_user}
  #     DB_PASSWORD: ${DB_PASSWORD:-ecommerce_pass}
  #     JWT_SECRET: ${JWT_SECRET}
  #     JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
  #   ports:
  #     - "8080:8080"

volumes:
  postgres_data: